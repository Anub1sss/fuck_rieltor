services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: rieltor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-prod}
      - DEBUG=${DEBUG:-1}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DB_HOST=db
      - DB_NAME=rieltor_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002}

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - web
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-prod}
      - DB_HOST=db
      - DB_NAME=rieltor_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - web
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-prod}
      - DB_HOST=db
      - DB_NAME=rieltor_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  parser:
    build: ./parser-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DJANGO_API_URL=http://web:8000/api
    depends_on:
      - web
    volumes:
      - ./parser-service:/app

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - web
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  score-service:
    build: ./score-service
    ports:
      - "3002:3002"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
